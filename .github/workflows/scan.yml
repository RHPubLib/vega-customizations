name: Sensitive content scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets + RHPL patterns)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/release.json https://api.github.com/repos/gitleaks/gitleaks/releases/latest
          VERSION=$(jq -r .tag_name /tmp/release.json | sed 's/^v//')
          echo "Installing gitleaks v${VERSION}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repo + full git history
        run: |
          gitleaks detect \
            --config=.gitleaks.toml \
            --source=. \
            --redact \
            --verbose \
            --no-banner \
            --exit-code=1
