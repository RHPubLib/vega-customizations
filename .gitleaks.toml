title = "Public-repo content scanner"

[extend]
useDefault = true

# Organization-specific indicator rules (internal IP ranges, hostname schemes,
# service usernames, vendor-credential formats) are deliberately NOT published
# in this file — enumerating them here would disclose the very facts they exist
# to protect. Maintainers apply those rules from a private config at the publish
# boundary (pre-push hook on the publishing host).

[allowlist]
description = "Paths that may legitimately match generic rules"
paths = [
  '''README\.md''',
  '''AGENTS\.md''',
  '''\.gitleaks\.toml''',
]
